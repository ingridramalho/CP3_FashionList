<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FashionList - Combinações de Roupas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <!-- LOGIN -->

        <div id="login-section">

            <h1>👗 FashionList</h1>
            <h2>Login</h2>

            <p id="login-error" class="error-message hidden"></p>

            <div class="form-group">
                <label>Usuário</label>
                <input
                    type="text"
                    id="username"
                    placeholder="Digite o usuário">
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Digite a senha">
            </div>

            <button
                class="btn-primary"
                onclick="efetuarLogin()">
                Entrar
            </button>

        </div>

        <!-- CRUD -->

        <div id="crud-section" class="hidden">

            <h1>👚 Minhas Combinações</h1>

            <p id="crud-error" class="error-message hidden"></p>

            <div class="form-group">

                <label>Nova combinação</label>

                <input
                    type="text"
                    id="input-combinacao"
                    placeholder="Ex: Blusa rosa + saia midi + sapatilha">

            </div>

            <div class="actions-grid">

                <button
                    class="btn-primary"
                    onclick="adicionarNoTopo()">

                    Adicionar no Início

                </button>

                <button
                    class="btn-secondary"
                    onclick="adicionarNoFinal()">

                    Adicionar no Final

                </button>

            </div>

            <p id="contador"></p>

            <div
                id="lista-combinacoes"
                class="list-container">
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
